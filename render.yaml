databases:
  - name: pratimzakon-db
    databaseName: pratimzakon
    user: pratimzakon
    plan: free

services:
  - type: web
    name: pratimzakon-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: cd backend && python migrate.py && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pratimzakon-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: FRONTEND_URL
        value: https://pratimzakon.onrender.com
      - key: BASE_URL
        value: https://pratimzakon-api.onrender.com
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_BASIC
        sync: false
      - key: STRIPE_PRICE_PLUS
        sync: false
      - key: SMTP_SERVER
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: FROM_EMAIL
        sync: false
      - key: FROM_NAME
        value: PratimZakon
      - key: ADMIN_EMAIL
        sync: false

  - type: web
    name: pratimzakon
    runtime: static
    buildCommand: ""
    staticPublishPath: frontend
