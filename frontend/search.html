<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pretraga arhive – PratimZakon</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue: #2563eb; --blue-dark: #1d4ed8;
      --gray-50: #f9fafb; --gray-100: #f3f4f6; --gray-200: #e5e7eb;
      --gray-600: #4b5563; --gray-900: #111827; --red: #dc2626;
    }
    body { font-family: system-ui, -apple-system, sans-serif; color: var(--gray-900); background: var(--gray-50); min-height: 100vh; }

    nav { display: flex; justify-content: space-between; align-items: center; padding: 14px 5%; background: #fff; border-bottom: 1px solid var(--gray-200); }
    .logo { font-size: 18px; font-weight: 700; color: var(--blue); text-decoration: none; }
    .nav-right { display: flex; gap: 12px; align-items: center; font-size: 14px; }
    .btn { display: inline-block; padding: 8px 18px; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; }
    .btn-primary { background: var(--blue); color: #fff; }
    .btn-primary:hover { background: var(--blue-dark); }
    .btn-outline { border: 1px solid var(--gray-200); color: var(--gray-600); background: #fff; }
    .btn-sm { padding: 6px 14px; font-size: 13px; }

    main { max-width: 900px; margin: 0 auto; padding: 40px 5%; }
    h1 { font-size: 24px; font-weight: 800; margin-bottom: 6px; }
    .subtitle { font-size: 14px; color: var(--gray-600); margin-bottom: 28px; }

    /* FILTER PANEL */
    .filters { background: #fff; border: 1px solid var(--gray-200); border-radius: 12px; padding: 24px; margin-bottom: 24px; }
    .filters-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
    .filter-group { display: flex; flex-direction: column; gap: 6px; }
    .filter-group label { font-size: 12px; font-weight: 600; color: var(--gray-600); text-transform: uppercase; letter-spacing: .4px; }
    .filter-group input, .filter-group select {
      padding: 9px 12px; border: 1px solid var(--gray-200); border-radius: 6px;
      font-size: 14px; color: var(--gray-900); background: #fff;
    }
    .filter-group input:focus, .filter-group select:focus { outline: none; border-color: var(--blue); }
    .filter-row { grid-column: 1 / -1; }
    .filter-actions { display: flex; gap: 10px; justify-content: flex-end; }

    /* RESULTS */
    .results-meta { font-size: 13px; color: var(--gray-600); margin-bottom: 16px; }
    .result-item {
      background: #fff; border: 1px solid var(--gray-200); border-radius: 8px;
      padding: 18px 20px; margin-bottom: 12px;
      transition: border-color .15s;
    }
    .result-item:hover { border-color: var(--blue); }
    .result-badges { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 8px; }
    .badge { display: inline-block; padding: 2px 9px; border-radius: 999px; font-size: 11px; font-weight: 600; }
    .badge-type { background: #dbeafe; color: #1d4ed8; }
    .badge-mu { background: #fef9c3; color: #854d0e; }
    .badge-sl { background: #f0fdf4; color: #15803d; }
    .result-title { font-size: 15px; font-weight: 600; margin-bottom: 6px; color: var(--gray-900); }
    .result-meta { font-size: 12px; color: var(--gray-600); margin-bottom: 10px; }
    .result-links { display: flex; gap: 10px; flex-wrap: wrap; }
    .link-html { color: var(--blue); font-size: 13px; font-weight: 500; text-decoration: none; }
    .link-html:hover { text-decoration: underline; }
    .link-pdf {
      display: inline-block; padding: 4px 12px; background: #fee2e2; color: var(--red);
      border-radius: 4px; font-size: 12px; font-weight: 600; text-decoration: none;
    }
    .link-pdf:hover { background: #fecaca; }

    /* PAGINATION */
    .pagination { display: flex; gap: 8px; justify-content: center; margin-top: 28px; flex-wrap: wrap; }
    .page-btn {
      padding: 7px 14px; border: 1px solid var(--gray-200); border-radius: 6px;
      font-size: 14px; cursor: pointer; background: #fff; color: var(--gray-900);
    }
    .page-btn:hover { border-color: var(--blue); color: var(--blue); }
    .page-btn.active { background: var(--blue); color: #fff; border-color: var(--blue); }
    .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* STATES */
    .empty-state { text-align: center; padding: 60px 20px; color: var(--gray-600); }
    .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
    .loading { text-align: center; padding: 40px; color: var(--gray-600); }
    .gate { background: #fff; border: 1px solid var(--gray-200); border-radius: 12px; padding: 48px; text-align: center; }
    .gate h2 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    .gate p { color: var(--gray-600); font-size: 14px; margin-bottom: 20px; }

    @media (max-width: 600px) {
      .filters-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">PratimZakon</a>
  <div class="nav-right">
    <a href="dashboard.html" class="btn btn-outline btn-sm">Dashboard</a>
    <button class="btn btn-outline btn-sm" onclick="logout()">Odjava</button>
  </div>
</nav>

<main>
  <h1>Pretraga arhive</h1>
  <p class="subtitle">Pretražite sve objave Narodnih novina od 2015. do danas</p>

  <!-- Gate za ne-Expert korisnike -->
  <div class="gate" id="expertGate" style="display:none">
    <div style="font-size:36px;margin-bottom:12px;">🔒</div>
    <h2>Expert paket</h2>
    <p>Pretraga arhive dostupna je isključivo korisnicima Expert paketa.</p>
    <a href="dashboard.html" class="btn btn-primary">Nadogradite plan</a>
  </div>

  <!-- Search sučelje -->
  <div id="searchArea" style="display:none">
    <div class="filters">
      <div class="filters-grid">
        <div class="filter-group filter-row">
          <label>Pretraga po naslovu</label>
          <input type="text" id="fQ" placeholder='npr. "porez na dohodak"' onkeydown="if(event.key==='Enter')doSearch(1)">
        </div>
        <div class="filter-group">
          <label>Tip dokumenta</label>
          <select id="fType">
            <option value="">Svi tipovi</option>
            <option value="ZAKON">Zakon</option>
            <option value="UREDBA">Uredba</option>
            <option value="PRAVILNIK">Pravilnik</option>
            <option value="ODLUKA">Odluka</option>
            <option value="RJEŠENJE">Rješenje</option>
            <option value="NAREDBA">Naredba</option>
            <option value="SPORAZUM">Sporazum</option>
          </select>
        </div>
        <div class="filter-group">
          <label>Dio</label>
          <select id="fPart">
            <option value="">SL + MU</option>
            <option value="SL">Službeni list (SL)</option>
            <option value="MU">Međunarodni ugovori (MU)</option>
          </select>
        </div>
        <div class="filter-group">
          <label>Institucija</label>
          <input type="text" id="fInst" placeholder='npr. "Vlada RH"'>
        </div>
        <div class="filter-group">
          <label>Datum od</label>
          <input type="date" id="fDateFrom">
        </div>
        <div class="filter-group">
          <label>Datum do</label>
          <input type="date" id="fDateTo">
        </div>
      </div>
      <div class="filter-actions">
        <button class="btn btn-outline btn-sm" onclick="clearFilters()">Poništi</button>
        <button class="btn btn-primary btn-sm" onclick="doSearch(1)">Pretraži</button>
      </div>
    </div>

    <div id="resultsArea"></div>
  </div>
</main>

<script>
  const API = "https://pratimzakon-api.onrender.com";
  let currentPage = 1;

  function getToken() { return localStorage.getItem("token"); }
  function logout() { localStorage.removeItem("token"); window.location.href = "index.html"; }

  async function authFetch(url, opts = {}) {
    const token = getToken();
    if (!token) { window.location.href = "index.html"; return null; }
    opts.headers = { ...(opts.headers || {}), Authorization: `Bearer ${token}` };
    const res = await fetch(API + url, opts);
    if (res.status === 401) { logout(); return null; }
    return res;
  }

  async function init() {
    if (!getToken()) { window.location.href = "index.html"; return; }
    const res = await authFetch("/auth/me");
    if (!res) return;
    const user = await res.json();
    if (user.plan_type !== "expert") {
      document.getElementById("expertGate").style.display = "block";
    } else {
      document.getElementById("searchArea").style.display = "block";
    }
  }

  async function doSearch(page) {
    currentPage = page;
    const q = document.getElementById("fQ").value.trim();
    const docType = document.getElementById("fType").value;
    const part = document.getElementById("fPart").value;
    const inst = document.getElementById("fInst").value.trim();
    const dateFrom = document.getElementById("fDateFrom").value;
    const dateTo = document.getElementById("fDateTo").value;

    if (!q && !docType && !part && !inst && !dateFrom && !dateTo) {
      showMessage("Unesite barem jedan parametar pretrage.");
      return;
    }

    const params = new URLSearchParams({ page, per_page: 20 });
    if (q) params.set("q", q);
    if (docType) params.set("doc_type", docType);
    if (part) params.set("part", part);
    if (inst) params.set("institution", inst);
    if (dateFrom) params.set("date_from", dateFrom);
    if (dateTo) params.set("date_to", dateTo);

    const area = document.getElementById("resultsArea");
    area.innerHTML = '<div class="loading">Pretražujem...</div>';

    const res = await authFetch(`/search/?${params}`);
    if (!res) return;

    if (res.status === 403) {
      document.getElementById("searchArea").style.display = "none";
      document.getElementById("expertGate").style.display = "block";
      return;
    }

    const data = await res.json();
    if (!res.ok) { showMessage(data.detail || "Greška."); return; }
    renderResults(data, params);
  }

  function renderResults(data, params) {
    const area = document.getElementById("resultsArea");

    if (data.total === 0) {
      area.innerHTML = `
        <div class="empty-state">
          <div class="icon">🔍</div>
          <p>Nema rezultata za zadane kriterije.</p>
        </div>`;
      return;
    }

    const from = (data.page - 1) * data.per_page + 1;
    const to = Math.min(data.page * data.per_page, data.total);
    const totalPages = Math.ceil(data.total / data.per_page);

    let html = `<div class="results-meta">Pronađeno <strong>${data.total}</strong> dokumenata · prikazano ${from}–${to}</div>`;

    for (const doc of data.results) {
      const typeBadge = doc.type
        ? `<span class="badge badge-type">${escHtml(doc.type)}</span>` : "";
      const partBadge = doc.part
        ? `<span class="badge badge-${doc.part.toLowerCase()}">${escHtml(doc.part)}</span>` : "";
      const metaParts = [];
      if (doc.institution) metaParts.push(escHtml(doc.institution));
      if (doc.published_date) metaParts.push(fmtDate(doc.published_date));
      if (doc.legal_area) metaParts.push(escHtml(doc.legal_area));

      const pdfLink = doc.pdf_url
        ? `<a href="${escHtml(doc.pdf_url)}" target="_blank" rel="noopener" class="link-pdf">↓ PDF</a>` : "";

      html += `
        <div class="result-item">
          <div class="result-badges">${typeBadge}${partBadge}</div>
          <div class="result-title">${escHtml(doc.title)}</div>
          ${metaParts.length ? `<div class="result-meta">${metaParts.join(" · ")}</div>` : ""}
          <div class="result-links">
            <a href="${escHtml(doc.url)}" target="_blank" rel="noopener" class="link-html">Otvori dokument →</a>
            ${pdfLink}
          </div>
        </div>`;
    }

    // Pagination
    if (totalPages > 1) {
      html += '<div class="pagination">';
      html += `<button class="page-btn" onclick="doSearch(${data.page - 1})" ${data.page <= 1 ? "disabled" : ""}>← Prethodna</button>`;
      const start = Math.max(1, data.page - 2);
      const end = Math.min(totalPages, data.page + 2);
      for (let p = start; p <= end; p++) {
        html += `<button class="page-btn ${p === data.page ? "active" : ""}" onclick="doSearch(${p})">${p}</button>`;
      }
      html += `<button class="page-btn" onclick="doSearch(${data.page + 1})" ${data.page >= totalPages ? "disabled" : ""}>Sljedeća →</button>`;
      html += '</div>';
    }

    document.getElementById("resultsArea").innerHTML = html;
    window.scrollTo({ top: 0, behavior: "smooth" });
  }

  function clearFilters() {
    ["fQ","fInst","fDateFrom","fDateTo"].forEach(id => document.getElementById(id).value = "");
    ["fType","fPart"].forEach(id => document.getElementById(id).selectedIndex = 0);
    document.getElementById("resultsArea").innerHTML = "";
  }

  function showMessage(msg) {
    document.getElementById("resultsArea").innerHTML =
      `<div class="empty-state"><p>${escHtml(msg)}</p></div>`;
  }

  function escHtml(str) {
    return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  function fmtDate(iso) {
    if (!iso) return "";
    const [y, m, d] = iso.split("-");
    return `${d}.${m}.${y}.`;
  }

  init();
</script>
</body>
</html>
