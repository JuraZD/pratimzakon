<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pretraga arhive – PratimZakon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #0d0d0d;
      --paper: #f8f7f4;
      --white: #ffffff;
      --mid: #6b6b6b;
      --rule: #d4d0c9;
      --serif: 'Playfair Display', Georgia, serif;
      --sans: 'DM Sans', sans-serif;
    }

    body {
      font-family: var(--sans);
      color: var(--ink);
      background: var(--paper);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    a { color: inherit; text-decoration: none; }

    /* NAV */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 6%;
      border-bottom: 1px solid var(--ink);
      background: var(--white);
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .logo {
      font-family: var(--serif);
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -.3px;
    }

    .nav-right { display: flex; gap: 8px; align-items: center; }

    .btn {
      font-family: var(--sans);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: .4px;
      padding: 8px 18px;
      cursor: pointer;
      border: 1px solid var(--ink);
      display: inline-block;
      transition: background .18s, color .18s;
      background: transparent;
      color: var(--ink);
    }

    .btn:hover { background: var(--ink); color: var(--white); }

    .btn-solid { background: var(--ink); color: var(--white); }
    .btn-solid:hover { background: #2a2a2a; }

    /* LAYOUT */
    main { max-width: 900px; margin: 0 auto; padding: 40px 6%; }

    h1 {
      font-family: var(--serif);
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 6px;
      letter-spacing: -.5px;
    }

    .subtitle {
      font-size: 14px;
      color: var(--mid);
      margin-bottom: 28px;
    }

    /* FILTERS */
    .filters {
      background: var(--white);
      border: 1px solid var(--ink);
      padding: 24px;
      margin-bottom: 24px;
    }

    .filters-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }

    .filter-group { display: flex; flex-direction: column; gap: 6px; }

    .filter-group label {
      font-size: 10px;
      font-weight: 600;
      color: var(--mid);
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }

    .filter-group input, .filter-group select {
      padding: 9px 12px;
      border: 1px solid var(--rule);
      font-family: var(--sans);
      font-size: 13px;
      color: var(--ink);
      background: var(--white);
      outline: none;
      transition: border-color .15s;
      border-radius: 0;
    }

    .filter-group input:focus, .filter-group select:focus { border-color: var(--ink); }

    .filter-row { grid-column: 1 / -1; }

    .filter-actions { display: flex; gap: 10px; justify-content: flex-end; }

    /* RESULTS */
    .results-meta {
      font-size: 12px;
      color: var(--mid);
      margin-bottom: 16px;
      letter-spacing: .2px;
    }

    .result-item {
      background: var(--white);
      border: 1px solid var(--rule);
      border-left: 3px solid var(--ink);
      padding: 18px 20px;
      margin-bottom: 10px;
      transition: border-left-color .15s;
    }

    .result-item:hover { border-left-color: var(--mid); }

    .result-badges {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 8px;
    }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .5px;
      border: 1px solid;
    }

    .badge-type { border-color: var(--ink); color: var(--ink); }
    .badge-mu { border-color: #92400e; color: #92400e; }
    .badge-sl { border-color: #166534; color: #166534; }

    .result-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 6px;
      line-height: 1.4;
    }

    .result-meta {
      font-size: 12px;
      color: var(--mid);
      margin-bottom: 10px;
      letter-spacing: .2px;
    }

    .result-links { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }

    .link-html {
      color: var(--ink);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: .2px;
    }

    .link-html:hover { text-decoration: underline; }

    .link-pdf {
      display: inline-block;
      padding: 3px 10px;
      color: #b91c1c;
      border: 1px solid #fca5a5;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .3px;
    }

    .link-pdf:hover { background: #fef2f2; }

    /* PAGINATION */
    .pagination {
      display: flex;
      gap: 4px;
      justify-content: center;
      margin-top: 28px;
      flex-wrap: wrap;
    }

    .page-btn {
      padding: 7px 14px;
      border: 1px solid var(--rule);
      font-family: var(--sans);
      font-size: 13px;
      cursor: pointer;
      background: var(--white);
      color: var(--ink);
      transition: border-color .15s;
    }

    .page-btn:hover { border-color: var(--ink); }
    .page-btn.active { background: var(--ink); color: var(--white); border-color: var(--ink); }
    .page-btn:disabled { opacity: .35; cursor: not-allowed; }

    /* STATES */
    .empty-state { text-align: center; padding: 60px 20px; color: var(--mid); }
    .empty-state .icon { font-size: 32px; margin-bottom: 12px; }

    .loading {
      text-align: center;
      padding: 40px;
      color: var(--mid);
      font-size: 14px;
    }

    .gate {
      background: var(--white);
      border: 1px solid var(--ink);
      padding: 60px;
      text-align: center;
    }

    .gate h2 {
      font-family: var(--serif);
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: -.3px;
    }

    .gate p { color: var(--mid); font-size: 14px; margin-bottom: 24px; }

    @media (max-width: 600px) {
      .filters-grid { grid-template-columns: 1fr; }
      nav { padding: 14px 5%; }
      main { padding: 28px 5%; }
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">PratimZakon</a>
  <div class="nav-right">
    <a href="dashboard.html" class="btn">Dashboard</a>
    <button class="btn" onclick="logout()">Odjava</button>
  </div>
</nav>

<main>
  <h1>Pretraga arhive</h1>
  <p class="subtitle">Pretražite sve objave Narodnih novina od 2015. do danas</p>

  <!-- Gate za ne-Plus korisnike -->
  <div class="gate" id="expertGate" style="display:none">
    <div style="font-size:32px;margin-bottom:12px;">⊘</div>
    <h2>Plus paket</h2>
    <p>Pretraga arhive dostupna je isključivo korisnicima Plus paketa.</p>
    <a href="dashboard.html" class="btn btn-solid">Nadogradite plan</a>
  </div>

  <!-- Search sučelje -->
  <div id="searchArea" style="display:none">
    <div class="filters">
      <div class="filters-grid">
        <div class="filter-group filter-row">
          <label>Pretraga po naslovu</label>
          <input type="text" id="fQ" placeholder='npr. "porez na dohodak"' onkeydown="if(event.key==='Enter')doSearch(1)">
        </div>
        <div class="filter-group">
          <label>Tip dokumenta</label>
          <select id="fType">
            <option value="">Svi tipovi</option>
            <option value="ZAKON">Zakon</option>
            <option value="UREDBA">Uredba</option>
            <option value="PRAVILNIK">Pravilnik</option>
            <option value="ODLUKA">Odluka</option>
            <option value="RJEŠENJE">Rješenje</option>
            <option value="NAREDBA">Naredba</option>
            <option value="SPORAZUM">Sporazum</option>
          </select>
        </div>
        <div class="filter-group">
          <label>Dio</label>
          <select id="fPart">
            <option value="">SL + MU</option>
            <option value="SL">Službeni list (SL)</option>
            <option value="MU">Međunarodni ugovori (MU)</option>
          </select>
        </div>
        <div class="filter-group">
          <label>Institucija</label>
          <input type="text" id="fInst" placeholder='npr. "Vlada RH"'>
        </div>
        <div class="filter-group">
          <label>Datum od</label>
          <input type="date" id="fDateFrom">
        </div>
        <div class="filter-group">
          <label>Datum do</label>
          <input type="date" id="fDateTo">
        </div>
      </div>
      <div class="filter-actions">
        <button class="btn" onclick="clearFilters()">Poništi</button>
        <button class="btn btn-solid" onclick="doSearch(1)">Pretraži</button>
      </div>
    </div>

    <div id="resultsArea"></div>
  </div>
</main>

<script>
  const API = "https://pratimzakon-api.onrender.com";
  let currentPage = 1;

  function getToken() { return localStorage.getItem("token"); }
  function logout() { localStorage.removeItem("token"); window.location.href = "index.html"; }

  async function authFetch(url, opts = {}) {
    const token = getToken();
    if (!token) { window.location.href = "index.html"; return null; }
    opts.headers = { ...(opts.headers || {}), Authorization: `Bearer ${token}` };
    const res = await fetch(API + url, opts);
    if (res.status === 401) { logout(); return null; }
    return res;
  }

  async function init() {
    if (!getToken()) { window.location.href = "index.html"; return; }
    const res = await authFetch("/auth/me");
    if (!res) return;
    const user = await res.json();
    if (user.plan_type !== "plus") {
      document.getElementById("expertGate").style.display = "block";
    } else {
      document.getElementById("searchArea").style.display = "block";
    }
  }

  async function doSearch(page) {
    currentPage = page;
    const q = document.getElementById("fQ").value.trim();
    const docType = document.getElementById("fType").value;
    const part = document.getElementById("fPart").value;
    const inst = document.getElementById("fInst").value.trim();
    const dateFrom = document.getElementById("fDateFrom").value;
    const dateTo = document.getElementById("fDateTo").value;

    if (!q && !docType && !part && !inst && !dateFrom && !dateTo) {
      showMessage("Unesite barem jedan parametar pretrage.");
      return;
    }

    const params = new URLSearchParams({ page, per_page: 20 });
    if (q) params.set("q", q);
    if (docType) params.set("doc_type", docType);
    if (part) params.set("part", part);
    if (inst) params.set("institution", inst);
    if (dateFrom) params.set("date_from", dateFrom);
    if (dateTo) params.set("date_to", dateTo);

    const area = document.getElementById("resultsArea");
    area.innerHTML = '<div class="loading">Pretražujem...</div>';

    const res = await authFetch(`/search/?${params}`);
    if (!res) return;

    if (res.status === 403) {
      document.getElementById("searchArea").style.display = "none";
      document.getElementById("expertGate").style.display = "block";
      return;
    }

    const data = await res.json();
    if (!res.ok) { showMessage(data.detail || "Greška."); return; }
    renderResults(data);
  }

  function renderResults(data) {
    const area = document.getElementById("resultsArea");

    if (data.total === 0) {
      area.innerHTML = `
        <div class="empty-state">
          <div class="icon">◎</div>
          <p>Nema rezultata za zadane kriterije.</p>
        </div>`;
      return;
    }

    const from = (data.page - 1) * data.per_page + 1;
    const to = Math.min(data.page * data.per_page, data.total);
    const totalPages = Math.ceil(data.total / data.per_page);

    let html = `<div class="results-meta">Pronađeno <strong>${data.total}</strong> dokumenata · prikazano ${from}–${to}</div>`;

    for (const doc of data.results) {
      const typeBadge = doc.type
        ? `<span class="badge badge-type">${escHtml(doc.type)}</span>` : "";
      const partBadge = doc.part
        ? `<span class="badge badge-${doc.part.toLowerCase()}">${escHtml(doc.part)}</span>` : "";
      const metaParts = [];
      if (doc.institution) metaParts.push(escHtml(doc.institution));
      if (doc.published_date) metaParts.push(fmtDate(doc.published_date));
      if (doc.legal_area) metaParts.push(escHtml(doc.legal_area));

      const pdfLink = doc.pdf_url
        ? `<a href="${escHtml(doc.pdf_url)}" target="_blank" rel="noopener" class="link-pdf">↓ PDF</a>` : "";

      html += `
        <div class="result-item">
          <div class="result-badges">${typeBadge}${partBadge}</div>
          <div class="result-title">${escHtml(doc.title)}</div>
          ${metaParts.length ? `<div class="result-meta">${metaParts.join(" · ")}</div>` : ""}
          <div class="result-links">
            <a href="${escHtml(doc.url)}" target="_blank" rel="noopener" class="link-html">Otvori dokument →</a>
            ${pdfLink}
          </div>
        </div>`;
    }

    if (totalPages > 1) {
      html += '<div class="pagination">';
      html += `<button class="page-btn" onclick="doSearch(${data.page - 1})" ${data.page <= 1 ? "disabled" : ""}>← Prethodna</button>`;
      const start = Math.max(1, data.page - 2);
      const end = Math.min(totalPages, data.page + 2);
      for (let p = start; p <= end; p++) {
        html += `<button class="page-btn ${p === data.page ? "active" : ""}" onclick="doSearch(${p})">${p}</button>`;
      }
      html += `<button class="page-btn" onclick="doSearch(${data.page + 1})" ${data.page >= totalPages ? "disabled" : ""}>Sljedeća →</button>`;
      html += '</div>';
    }

    document.getElementById("resultsArea").innerHTML = html;
    window.scrollTo({ top: 0, behavior: "smooth" });
  }

  function clearFilters() {
    ["fQ","fInst","fDateFrom","fDateTo"].forEach(id => document.getElementById(id).value = "");
    ["fType","fPart"].forEach(id => document.getElementById(id).selectedIndex = 0);
    document.getElementById("resultsArea").innerHTML = "";
  }

  function showMessage(msg) {
    document.getElementById("resultsArea").innerHTML =
      `<div class="empty-state"><p>${escHtml(msg)}</p></div>`;
  }

  function escHtml(str) {
    return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  function fmtDate(iso) {
    if (!iso) return "";
    const [y, m, d] = iso.split("-");
    return `${d}.${m}.${y}.`;
  }

  init();
</script>
</body>
</html>
