name: Deploy frontend na GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend

      - name: Deploy na GitHub Pages (attempt 1)
        id: deploy1
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Wait before retry (attempt 2)
        if: steps.deploy1.outcome == 'failure'
        run: |
          echo "Attempt 1 failed, waiting 30s before retry..."
          sleep 30

      - name: Deploy na GitHub Pages (attempt 2)
        id: deploy2
        if: steps.deploy1.outcome == 'failure'
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Wait before retry (attempt 3)
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        run: |
          echo "Attempt 2 failed, waiting 60s before final retry..."
          sleep 60

      - name: Deploy na GitHub Pages (attempt 3)
        id: deploy3
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        uses: actions/deploy-pages@v4

      - name: Check deployment result
        if: always()
        run: |
          if [[ "${{ steps.deploy1.outcome }}" == "success" ]]; then
            echo "Deployment succeeded on attempt 1."
          elif [[ "${{ steps.deploy2.outcome }}" == "success" ]]; then
            echo "Deployment succeeded on attempt 2."
          elif [[ "${{ steps.deploy3.outcome }}" == "success" ]]; then
            echo "Deployment succeeded on attempt 3."
          else
            echo "All 3 deployment attempts failed."
            exit 1
          fi
