name: Keep Alive - Ping API

on:
  schedule:
    - cron: '*/10 * * * *'  # svakih 10 minuta
  workflow_dispatch:         # omogući ručno pokretanje

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API to prevent sleep
        run: |
          echo "Pingam API..."
          curl -s --max-time 60 https://pratimzakon.onrender.com/health || true
          curl -s --max-time 60 https://pratimzakon.onrender.com/ || true
          echo "Ping završen."
