name: Keep Alive - Ping API

on:
  schedule:
    - cron: '*/10 * * * *'  # svakih 10 minuta
  workflow_dispatch:         # omogući ručno pokretanje

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API health endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://pratimzakon-api.onrender.com/health)
          echo "HTTP status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "API nije odgovorio sa 200 OK"
            exit 1
          fi
          echo "API je aktivan."
